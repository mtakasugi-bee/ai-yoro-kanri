<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI案件進捗管理 | Ai・よろ</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;
  --color-primary:#4A4A4A;--color-primary-d:#2B2B2B;--color-primary-m:#6B6B6B;
  --color-primary-l:#E8E8E8;--color-primary-p:#F4F4F4;
  --color-bg:#FFFFFF;--color-bg2:#F7F7F7;--color-bg3:#EEEEEE;
  --color-text:#1E1E1E;--color-text2:#6B6B6B;--color-text3:#AAAAAA;
  --color-border:#E0E0E0;--color-border2:#CCCCCC;
  --color-warn:#7A6A3A;--color-warn-bg:#F5F0E0;
  --color-ok-bg:#EAF2EA;--color-ok:#2A5E2A;
  --radius:9px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-bg2);color:var(--color-text);min-height:100vh}
.app{max-width:1380px;margin:0 auto;padding:1.5rem 1rem}
.app-header{display:flex;align-items:center;gap:16px;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--color-border)}
.logo-mark{width:40px;height:40px;border-radius:8px;background:var(--color-primary-d);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.app-header h1{font-size:18px;font-weight:700;color:var(--color-primary-d)}
.app-header .subtitle{font-size:12px;color:var(--color-text2);margin-top:2px}
.sync-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;font-size:12px;color:var(--color-text2);background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:7px 12px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#5BAD72;flex-shrink:0}
.sync-dot.syncing{background:#B8A060;animation:pulse 1s infinite}
.sync-dot.error{background:#B05050}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* サマリー */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px;margin-bottom:1.25rem}
.metric{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius);padding:.8rem 1rem}
.metric .label{font-size:11px;color:var(--color-text2);margin-bottom:4px;font-weight:500}
.metric .val{font-size:20px;font-weight:700;color:var(--color-primary-d)}
.metric.hi{background:var(--color-primary-p);border-color:var(--color-primary-l)}

/* タブ */
.section-tabs{display:flex;gap:0;border-bottom:2px solid var(--color-border);margin-bottom:1rem}
.section-tab{font-size:14px;padding:10px 22px;cursor:pointer;color:var(--color-text2);border-bottom:3px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);font-weight:500;margin-bottom:-2px;transition:.15s;display:flex;align-items:center;gap:6px}
.section-tab.active{color:var(--color-primary-d);border-bottom-color:var(--color-primary-d);font-weight:700}
.section-tab:hover:not(.active){color:var(--color-primary-d);background:var(--color-primary-p)}
.section-tab .tab-count{font-size:11px;padding:1px 7px;border-radius:10px;background:var(--color-primary-l);color:var(--color-primary-m);font-weight:600}
.section-tab.active .tab-count{background:var(--color-primary-d);color:#fff}

/* フィルター */
.filter-row{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
.filter-row input,.filter-row select{font-size:13px;padding:7px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);outline:none;font-family:var(--font-sans)}
.filter-row input{flex:1;min-width:150px}

/* ボタン */
.btn{font-size:13px;padding:7px 14px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;font-family:var(--font-sans);font-weight:500;transition:all .15s}
.btn:hover{background:var(--color-bg2)}
.btn-primary{background:var(--color-primary-d);color:#fff;border-color:var(--color-primary-d)}
.btn-primary:hover{background:var(--color-primary)}
.btn-sm{font-size:12px;padding:4px 10px}

/* テーブル共通 */
.table-wrap{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius);overflow:auto;box-shadow:0 1px 4px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 11px;font-weight:600;font-size:11px;color:var(--color-text2);border-bottom:1px solid var(--color-border);background:var(--color-primary-p);white-space:nowrap;letter-spacing:.04em;cursor:pointer;user-select:none}
th:hover{background:var(--color-primary-l)}
td{padding:9px 11px;border-bottom:1px solid var(--color-border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-bg2)}
.company-link{color:var(--color-primary-d);cursor:pointer;font-weight:600;border-bottom:1px solid var(--color-border2)}
.company-link:hover{color:var(--color-primary)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.b-todo{background:#EBEBEB;color:#555}
.b-wip{background:#E8F0E8;color:#2A5E2A;border:1px solid #C0D8C0}
.b-review{background:#EAE8F0;color:#3A3070}
.b-done{background:var(--color-primary-d);color:#fff}
.b-hold{background:#F0F0F0;color:#888}
.fix-pending{background:var(--color-warn-bg);color:var(--color-warn);font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}
.fix-all-done{background:var(--color-ok-bg);color:var(--color-ok);font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}
.fix-none{color:var(--color-text3);font-size:12px}
.deadline-warn{color:var(--color-warn);font-weight:600}
.deadline-over{color:#B05050;font-weight:600}
.prog-wrap{display:flex;align-items:center;gap:6px}
.prog-bar{flex:1;height:5px;background:var(--color-bg3);border-radius:3px;overflow:hidden;min-width:40px}
.prog-fill{height:100%;border-radius:3px;background:var(--color-primary)}
.prog-val{font-size:11px;color:var(--color-text2);min-width:26px}
.ico-btn{background:none;border:none;cursor:pointer;color:var(--color-text3);padding:3px 5px;border-radius:4px;font-size:15px}
.ico-btn:hover{color:var(--color-primary-d);background:var(--color-primary-p)}
.empty{text-align:center;padding:3rem;color:var(--color-text2);font-size:13px}
/* メモ：省略なし、折り返し表示 */
.memo-cell{font-size:12px;color:var(--color-text2);max-width:200px;word-break:break-all;white-space:pre-wrap;line-height:1.5}
.mtg-next{font-size:12px;white-space:nowrap}
.mtg-next.soon{color:var(--color-warn);font-weight:600}
.mtg-next.past{color:var(--color-text3)}
/* 見込みバッジ */
.prospect-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.pb-demo-ok{background:#E8F0E8;color:#2A5E2A}
.pb-demo-ng{background:#EBEBEB;color:#666}
.pb-hot{background:var(--color-warn-bg);color:var(--color-warn)}
/* 保守バッジ */
.maintenance-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;background:#EAE8F0;color:#3A3070}

/* パネル */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50}
.overlay.open{display:block}
.panel{position:fixed;top:0;right:0;width:min(580px,100vw);height:100vh;background:var(--color-bg);border-left:1px solid var(--color-border);z-index:51;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-4px 0 24px rgba(0,0,0,.08)}
.panel.open{transform:translateX(0)}
.panel-header{padding:1.25rem;border-bottom:1px solid var(--color-border);display:flex;align-items:flex-start;gap:8px;flex-shrink:0;background:var(--color-primary-p)}
.panel-header h2{font-size:16px;font-weight:700;flex:1;line-height:1.4;color:var(--color-primary-d)}
.panel-close{background:none;border:none;cursor:pointer;color:var(--color-text2);font-size:20px;padding:0}
.ptabs{display:flex;border-bottom:1px solid var(--color-border);flex-shrink:0;overflow-x:auto}
.ptab{font-size:13px;padding:9px 15px;cursor:pointer;color:var(--color-text2);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);font-weight:500;white-space:nowrap}
.ptab.active{color:var(--color-primary-d);border-bottom-color:var(--color-primary-d);font-weight:700}
.ptab:hover:not(.active){color:var(--color-primary-d);background:var(--color-primary-p)}
.panel-body{padding:1.25rem;flex:1;overflow-y:auto}
.section{margin-bottom:1.5rem}
.section-title{font-size:11px;font-weight:700;color:var(--color-primary-d);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.section-title::before{content:"";display:block;width:3px;height:13px;background:var(--color-primary);border-radius:2px}
.edit-field{margin-bottom:10px}
.edit-field label{display:block;font-size:12px;color:var(--color-text2);margin-bottom:4px;font-weight:500}
.edit-field input,.edit-field select,.edit-field textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);outline:none}
.edit-field input:focus,.edit-field select:focus,.edit-field textarea:focus{border-color:var(--color-primary);box-shadow:0 0 0 2px var(--color-primary-p)}
.edit-field textarea{resize:vertical;min-height:70px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mtg-item{display:inline-flex;align-items:center;gap:4px;background:var(--color-primary-p);color:var(--color-primary-d);font-size:12px;padding:3px 8px;border-radius:4px;margin:2px;font-weight:500;border:1px solid var(--color-primary-l)}
.mtg-item button{background:none;border:none;cursor:pointer;color:var(--color-primary-m);font-size:13px;padding:0;line-height:1}
.add-row{display:flex;gap:6px;margin-top:6px}
.add-row input{flex:1;font-size:13px;padding:6px 9px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);outline:none}
.timeline{border-left:2px solid var(--color-primary-l);padding-left:1rem;margin-top:.5rem}
.tl-item{position:relative;margin-bottom:.75rem}
.tl-item::before{content:"";position:absolute;left:-1.35rem;top:.35rem;width:8px;height:8px;border-radius:50%;background:var(--color-border2)}
.tl-item.past::before{background:#5BAD72}
.tl-item.soon::before{background:#B8A060}
.tl-item.over::before{background:#B05050}
.tl-date{font-size:11px;color:var(--color-text2)}
.tl-label{font-size:13px;font-weight:600}
.save-bar{padding:1rem 1.25rem;border-top:1px solid var(--color-border);display:flex;gap:8px;justify-content:flex-end;background:var(--color-bg);flex-shrink:0}

/* 修正項目 */
.fix-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--color-border);border-radius:var(--radius-sm);margin-bottom:6px;transition:.15s;cursor:pointer}
.fix-item:hover{border-color:var(--color-primary-l);background:var(--color-primary-p)}
.fix-item.done-item{opacity:.5}
.fix-check{width:18px;height:18px;border:2px solid var(--color-border2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;background:var(--color-bg)}
.fix-item.done-item .fix-check{background:var(--color-primary-d);border-color:var(--color-primary-d);color:#fff}
.fix-item-left{flex:1;min-width:0}
.fix-item-title{font-size:13px;font-weight:500;margin-bottom:2px;word-break:break-word;line-height:1.5}
.fix-item-title.strikethrough{text-decoration:line-through;color:var(--color-text2)}
.fix-note{font-size:12px;color:var(--color-text2);font-style:italic}
.fix-progress{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--color-primary-p);border-radius:var(--radius-sm);margin-bottom:10px}
.fix-progress-bar{flex:1;height:6px;background:var(--color-bg3);border-radius:3px;overflow:hidden}
.fix-progress-fill{height:100%;border-radius:3px;background:var(--color-primary);transition:width .4s}
.fix-progress-label{font-size:12px;color:var(--color-text2);white-space:nowrap;font-weight:500}
.ai-paste-box{border:1.5px dashed var(--color-border2);border-radius:var(--radius-sm);padding:12px;background:var(--color-bg2);margin-bottom:12px}
.ai-paste-box textarea{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);resize:vertical;min-height:70px;outline:none;margin-bottom:8px}
.ai-hint{font-size:12px;color:var(--color-text2);margin-bottom:8px;line-height:1.6}

/* モーダル */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--color-bg);border-radius:var(--radius);padding:1.5rem;width:min(520px,94vw);border:1px solid var(--color-border);max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.modal-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--color-border)}
.modal-header h2{font-size:16px;font-weight:700;color:var(--color-primary-d);flex:1}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--color-primary-d);color:#fff;padding:10px 22px;border-radius:6px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.hint{padding:10px 12px;background:var(--color-primary-p);border-radius:var(--radius-sm);font-size:12px;color:var(--color-text2);border:1px solid var(--color-primary-l)}
/* ロール切替 */
.role-switch{display:flex;gap:4px;background:var(--color-bg2);border:1px solid var(--color-border);border-radius:var(--radius);padding:3px}
.role-btn{font-size:12px;padding:7px 14px;border:none;background:none;color:var(--color-text2);cursor:pointer;border-radius:var(--radius-sm);font-family:var(--font-sans);font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.role-btn.active{background:var(--color-primary-d);color:#fff}
.admin-mode-switch{display:flex;gap:6px;margin-bottom:1.25rem}
.amode-btn{font-size:13px;padding:8px 16px;border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text2);cursor:pointer;border-radius:var(--radius-sm);font-family:var(--font-sans);font-weight:500;display:inline-flex;align-items:center;gap:6px}
.amode-btn.active{background:var(--color-primary-p);color:var(--color-primary-d);border-color:var(--color-primary-l);font-weight:700}
.worker-select-bar{display:flex;align-items:center;gap:10px;background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;flex-wrap:wrap}
.worker-select-bar select{font-size:14px;padding:8px 12px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);outline:none;font-family:var(--font-sans);min-width:280px}
/* 作業者カード */
.wcard{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.wcard-head{display:flex;align-items:center;gap:8px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--color-border)}
.wcard-head h3{font-size:15px;font-weight:700;color:var(--color-primary-d);flex:1}
.wsection{margin-bottom:1.5rem}
.wsection-title{font-size:12px;font-weight:700;color:var(--color-primary-d);letter-spacing:.05em;margin-bottom:.6rem;display:flex;align-items:center;gap:6px}
.wsection-title i{font-size:15px}
/* タスク行 */
.task-item{display:grid;grid-template-columns:auto 1fr auto auto auto;gap:8px;align-items:center;padding:8px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);margin-bottom:6px;font-size:13px}
.task-item.done{opacity:.55}
.task-check{width:18px;height:18px;border:2px solid var(--color-border2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--color-bg)}
.task-item.done .task-check{background:var(--color-primary-d);border-color:var(--color-primary-d);color:#fff}
.task-title{word-break:break-word}
.task-title.strike{text-decoration:line-through;color:var(--color-text2)}
.task-date-label{font-size:11px;color:var(--color-text3);white-space:nowrap}
.task-date-val{font-size:11px;color:var(--color-text2);white-space:nowrap}
.wfield{margin-bottom:8px}
.wfield label{display:block;font-size:12px;color:var(--color-text2);margin-bottom:3px;font-weight:500}
.wfield input,.wfield textarea,.wfield select{width:100%;font-size:13px;padding:7px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);outline:none}
.wfield textarea{resize:vertical;min-height:50px}
.task-add-grid{display:grid;grid-template-columns:1fr auto auto auto;gap:6px;align-items:end;margin-top:6px}
@media(max-width:600px){.task-add-grid{grid-template-columns:1fr}.task-item{grid-template-columns:auto 1fr}}
/* ログイン情報 */
.cred-locked{text-align:center;padding:2rem;background:var(--color-bg2);border:1px dashed var(--color-border2);border-radius:var(--radius-sm)}
.cred-item{border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px}
.cred-item-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cred-item-head strong{font-size:13px;flex:1}
.cred-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:4px}
.cred-row .ck{font-size:11px;color:var(--color-text3);width:48px;flex-shrink:0}
.cred-row .cv{font-family:monospace;background:var(--color-bg2);padding:2px 8px;border-radius:4px;flex:1;word-break:break-all}
.copy-btn{background:none;border:1px solid var(--color-border);border-radius:4px;cursor:pointer;color:var(--color-text2);padding:2px 6px;font-size:11px}
.copy-btn:hover{background:var(--color-primary-p)}
.task-badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600}
.tb-todo{background:#EBEBEB;color:#666}
.tb-doing{background:var(--color-warn-bg);color:var(--color-warn)}
.tb-done{background:var(--color-ok-bg);color:var(--color-ok)}
.tb-carry{background:#EAE8F0;color:#3A3070}
.mtg-block-head .mtg-type{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;white-space:nowrap}
.mtg-type-customer{background:#E3EEF7;color:#1F5C8B}
.mtg-type-internal{background:#F3EDE0;color:#7A5C1F}
/* 定例日程ブロック */
.mtg-block{border:1px solid var(--color-border);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden}
.mtg-block-head{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--color-primary-p);border-bottom:1px solid var(--color-border)}
.mtg-block-head .mtg-date{font-size:13px;font-weight:700;color:var(--color-primary-d)}
.mtg-block-head .mtg-count{font-size:11px;color:var(--color-text2)}
.mtg-block-body{padding:10px 12px}
.mtg-task-add{display:flex;gap:6px;margin-top:8px}
.mtg-task-add input{flex:1;font-size:13px;padding:6px 9px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);outline:none}
.mtg-task-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--color-bg3);font-size:13px}
.mtg-task-item:last-child{border-bottom:none}
.mtg-task-item .tt{flex:1;word-break:break-word}
.mtg-task-item.done .tt{text-decoration:line-through;color:var(--color-text2)}
.task-status-btn{font-size:11px;padding:2px 9px;border-radius:4px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-sans);white-space:nowrap}

// 日付を YYYY-MM-DD 文字列に正規化（どんな形式が来ても対応）
function normDate(d){
  if(!d)return"";
  if(d instanceof Date)return d.toISOString().slice(0,10);
  const s=String(d).trim();
  if(!s)return"";
  // すでに YYYY-MM-DD 形式
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);

  const dt=new Date(s);
  if(isNaN(dt))return"";
  // タイムゾーンずれ防止のためローカル日付で組み立て
  const y=dt.getFullYear(),m=String(dt.getMonth()+1).padStart(2,"0"),day=String(dt.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function fd(d){
  const n=normDate(d);
  if(!n)return"–";
  const p=n.split("-");
  return p[0]+"/"+(+p[1])+"/"+(+p[2]);
}
function fa(n){return(!n&&n!==0)||n===0?"–":"¥"+Number(n).toLocaleString()}
function tod(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dcls(d){const n=normDate(d);if(!n)return"";const diff=(new Date(n)-tod())/(864e5);return diff<0?"deadline-over":diff<=14?"deadline-warn":"";}
function nextMtg(mtg){
  if(!mtg||!mtg.length)return null;
  const t=tod();
  const dates=mtg.map(m=>normDate(m)).filter(Boolean).map(m=>new Date(m)).filter(d=>!isNaN(d)).sort((a,b)=>a-b);
  if(!dates.length)return null;
  const future=dates.filter(d=>d>=t);
  if(future.length)return {date:future[0].toISOString().slice(0,10),future:true};
  return {date:dates[dates.length-1].toISOString().slice(0,10),future:false};
}
function tryParse(v){try{return JSON.parse(v);}catch{return[];}}
function setSyncState(s,m){
  document.getElementById("sync-dot").className="sync-dot"+(s==="syncing"?" syncing":s==="error"?" error":"");
  document.getElementById("sync-label").textContent=m;
}
function showToast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}

async function gasRequest(params){
  const url=GAS_URL+"?"+new URLSearchParams({action:params.action});
  const opts=params.action==="getAll"?{method:"GET"}:{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(params)};
  const res=await fetch(url,opts);const json=await res.json();
  if(!json.ok)throw new Error(json.error||"エラー");return json.data;
}
async function loadFromGAS(){
  setSyncState("syncing","スプレッドシートから読み込み中…");
  try{
    const data=await gasRequest({action:"getAll"});
    if(data&&data.length>0){
      projects=data.map(p=>({
        ...p,section:p.section||"active",
        mtg:(Array.isArray(p.mtg)?p.mtg:tryParse(p.mtg||"[]")).map(m=>normDate(m)).filter(Boolean),
        fixes:Array.isArray(p.fixes)?p.fixes:tryParse(p.fixes||"[]"),
        tasks:Array.isArray(p.tasks)?p.tasks:tryParse(p.tasks||"[]"),
        meetings:Array.isArray(p.meetings)?p.meetings:tryParse(p.meetings||"[]"),
        credentials:Array.isArray(p.credentials)?p.credentials:tryParse(p.credentials||"[]"),
        amount:Number(p.amount)||0,progress:Number(p.progress)||0,id:Number(p.id)||0,
        prospectAmount:Number(p.prospectAmount)||0,
        deadline:normDate(p.deadline),
        revision:normDate(p.revision),
        nextSchedule:normDate(p.nextSchedule),
        demoReady:p.demoReady==="true"||p.demoReady===true,
        maintenance:p.maintenance==="true"||p.maintenance===true,
      }));
      // ID採番の最大値を更新
      projects.forEach(p=>{
        (p.tasks||[]).forEach(t=>{if(t.id>=nextTaskId)nextTaskId=t.id+1;});
        (p.credentials||[]).forEach(c=>{if(c.id>=nextCredId)nextCredId=c.id+1;});
        (p.meetings||[]).forEach(mt=>{if(mt.id>=nextMtgId)nextMtgId=mt.id+1;(mt.tasks||[]).forEach(t=>{if(t.id>=nextTaskId)nextTaskId=t.id+1;});});
      });
      nextId=Math.max(...projects.map(p=>p.id))+1;
      setSyncState("ok","同期済み — "+new Date().toLocaleTimeString("ja-JP"));
    }else{
      projects=INITIAL_DATA.map(p=>({...p}));nextId=31;
      setSyncState("ok","初期データ読み込み完了");
      for(const p of projects)await gasRequest({action:"save",project:p});
      showToast("✓ 初期データをスプレッドシートに保存しました");
    }
    refresh();
  }catch(e){
    projects=INITIAL_DATA.map(p=>({...p}));nextId=31;
    setSyncState("error","オフライン — ローカルデータで表示");refresh();
  }
}

  catch(e){setSyncState("error","保存エラー: "+e.message);showToast("⚠ 保存失敗");}
}

}

function renderSummary(){
  const active=projects.filter(p=>p.section==="active");
  const comp=projects.filter(p=>p.section==="completed");
  const prosp=projects.filter(p=>p.section==="prospect");
  // 受注金額 = 構築中 + 完了済み（契約済み）
  const rev=active.reduce((s,p)=>s+Number(p.amount||0),0)+comp.reduce((s,p)=>s+Number(p.amount||0),0);
  // 見込み金額 = prospectのみ
  const prospRev=prosp.reduce((s,p)=>s+Number(p.prospectAmount||0),0);
  const pf=active.reduce((s,p)=>s+(p.fixes||[]).filter(f=>!f.done).length,0);
  const near=active.filter(p=>p.deadline&&(new Date(p.deadline)-tod())/(864e5)<=14).length;

  document.getElementById("summary").innerHTML=`
    <div class="metric"><div class="label">構築中</div><div class="val">${active.length}</div></div>
    <div class="metric"><div class="label">完了済み</div><div class="val">${comp.length}</div></div>
    <div class="metric"><div class="label">見込み</div><div class="val">${prosp.length}</div></div>
    <div class="metric hi"><div class="label">受注金額（契約済み）</div><div class="val" style="font-size:13px">¥${rev.toLocaleString()}</div></div>
    <div class="metric hi"><div class="label">見込み金額（契約前）</div><div class="val" style="font-size:13px">¥${prospRev.toLocaleString()}</div></div>
    <div class="metric${near>0?" hi":""}"><div class="label">期日14日以内</div><div class="val" style="color:${near>0?"var(--color-warn)":""}">${near}</div></div>
    <div class="metric${pf>0?" hi":""}"><div class="label">未完了の修正</div><div class="val" style="color:${pf>0?"var(--color-warn)":""}">${pf}</div></div>`;

  // タブカウント更新
  document.getElementById("cnt-active").textContent=active.length;
  document.getElementById("cnt-completed").textContent=comp.length;
  document.getElementById("cnt-prospect").textContent=prosp.length;

  // ===== 担当者別集計 =====
  // 担当者を分解（"神谷さん/高杉" → ["神谷さん","高杉"] のように分割）
  const personMap={};
  [...active,...comp].forEach(p=>{
    const persons=(p.person||"").split(/[\/・,、]/).map(s=>s.trim()).filter(Boolean);
    persons.forEach(name=>{
      if(!personMap[name])personMap[name]={active:0,completed:0,amount:0};
      if(p.section==="active"){personMap[name].active++;personMap[name].amount+=Number(p.amount||0);}
      else{personMap[name].completed++;personMap[name].amount+=Number(p.amount||0);}
    });
  });
  const personEntries=Object.entries(personMap).sort((a,b)=>(b[1].active+b[1].completed)-(a[1].active+a[1].completed));
  if(personEntries.length>0){
    const cards=personEntries.map(([name,d])=>`
      <div style="background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius);padding:.7rem 1rem;display:flex;align-items:center;gap:12px;min-width:0">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--color-primary-d);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${name.slice(0,2)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;color:var(--color-primary-d);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
          <div style="font-size:11px;color:var(--color-text2);margin-top:2px">
            構築中 <strong>${d.active}</strong> 件 &nbsp;完了 <strong>${d.completed}</strong> 件
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:12px;font-weight:700;color:var(--color-primary-d)">¥${d.amount.toLocaleString()}</div>
          <div style="font-size:10px;color:var(--color-text3)">担当合計</div>
        </div>
      </div>`).join("");
    document.getElementById("person-summary").innerHTML=`
      <div style="font-size:11px;font-weight:700;color:var(--color-text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.6rem">担当者別案件数</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">${cards}</div>`;
  } else {
    document.getElementById("person-summary").innerHTML="";
  }
}

function render(){
  renderSummary();renderPersonFilter();
  const q=(document.getElementById("search").value||"").toLowerCase();
  const fp=document.getElementById("filter-person").value;
  const fd2=document.getElementById("filter-deadline").value;
  const ff=document.getElementById("filter-fix").value;
  const t=tod();

  let list=projects.filter(p=>{
    if(p.section!==currentSection)return false;
    if(q&&!p.company.toLowerCase().includes(q)&&!(p.person||"").toLowerCase().includes(q))return false;
    if(fp&&p.person!==fp)return false;
    if(currentSection==="active"){
      if(fd2){
        if(!p.deadline)return false;
        const diff=(new Date(p.deadline)-t)/(864e5);
        if(fd2==="over"&&diff>=0)return false;
        if(fd2==="week"&&(diff<0||diff>7))return false;
        if(fd2==="month"&&(diff<0||diff>30))return false;
      }
      if(ff){
        const fixes=p.fixes||[];
        const pending=fixes.filter(f=>!f.done).length;
        if(ff==="has"&&pending===0)return false;
        if(ff==="done"&&(fixes.length===0||pending>0))return false;
      }
    }
    return true;
  });

  list.sort((a,b)=>{
    let av=a[sortKey]??"",bv=b[sortKey]??"";
    if(sortKey==="amount"||sortKey==="progress"||sortKey==="prospectAmount"){av=Number(av);bv=Number(bv);}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });

  const area=document.getElementById("table-area");
  if(!list.length){area.innerHTML=`<div class="table-wrap"><div class="empty">該当する案件がありません</div></div>`;return;}

  if(currentSection==="active") area.innerHTML=renderActiveTable(list);
  else if(currentSection==="completed") area.innerHTML=renderCompletedTable(list);
  else area.innerHTML=renderProspectTable(list);
}

function renderTimeline(p){
  const events=[];
  if(p.revision)events.push({date:p.revision,label:"最終修正締切"});
  if(p.deadline)events.push({date:p.deadline,label:p.section==="completed"?"納品日":"最終期日"});
  if(p.nextSchedule)events.push({date:p.nextSchedule,label:"次回日程"});
  (p.mtg||[]).forEach(m=>events.push({date:m,label:"MTG"}));
  (p.fixes||[]).filter(f=>f.date).forEach(f=>events.push({date:f.date,label:`修正: ${f.title}`,done:f.done}));
  events.sort((a,b)=>a.date.localeCompare(b.date));
  const t=tod();
  function tlcls(d){const diff=(new Date(d)-t)/(864e5);return diff<0?"past":diff<=14?"soon":"";}
  const html=events.length?events.map(e=>`<div class="tl-item ${tlcls(e.date)}"><div class="tl-date">${fd(e.date)}</div><div class="tl-label">${e.label}</div></div>`).join(""):`<div style="font-size:13px;color:var(--color-text2)">日程未登録</div>`;
  document.getElementById("panel-body").innerHTML=`<div class="section"><div class="timeline">${html}</div></div>`;
}

function collectInfoFields(){
  const p=projects.find(x=>x.id===panelId);if(!p)return;
  // DOMに該当フィールドが存在する場合のみ値を取得（存在しなければ既存値を保持）
  const has=id=>document.getElementById(id)!==null;
  const g=id=>{const el=document.getElementById(id);return el?el.value:undefined;};
  // infoタブが描画されていない場合は何もしない
  if(!has("p-memo"))return;

  if(has("p-memo"))p.memo=g("p-memo");
  if(has("p-person"))p.person=g("p-person");
  if(has("p-type"))p.type=g("p-type");

  if(p.section==="active"){
    if(has("p-deadline"))p.deadline=g("p-deadline");
    if(has("p-revision"))p.revision=g("p-revision");
    if(has("p-amount"))p.amount=Number(g("p-amount"))||0;
    if(has("p-status"))p.status=g("p-status");
    if(has("p-progress"))p.progress=Number(g("p-progress"))||0;
  }else if(p.section==="completed"){
    if(has("p-deadline"))p.deadline=g("p-deadline");
    if(has("p-amount"))p.amount=Number(g("p-amount"))||0;
    if(has("p-maintenance")){const mv=g("p-maintenance");p.maintenance=mv==="true"?true:mv==="false"?false:null;}
    if(has("p-maintenancePeriod"))p.maintenancePeriod=g("p-maintenancePeriod")||"";
    if(has("p-maintenanceFee"))p.maintenanceFee=Number(g("p-maintenanceFee"))||0;
    if(has("p-status"))p.status=g("p-status")||"構築完了";
  }else if(p.section==="prospect"){
    if(has("p-prospectAmount"))p.prospectAmount=Number(g("p-prospectAmount"))||0;
    if(has("p-demoReady"))p.demoReady=g("p-demoReady")==="true";
    if(has("p-nextSchedule"))p.nextSchedule=g("p-nextSchedule")||"";
    if(has("p-startEstimate"))p.startEstimate=g("p-startEstimate")||"";
    if(has("p-status"))p.status=g("p-status")||"契約前";
  }
  // ステータスに基づいてセクションを自動移動
  const newSection=STATUS_SECTION[p.status];
  if(newSection&&newSection!==p.section){
    p.section=newSection;
    if(newSection==="completed"){p.maintenance=p.maintenance??null;p.maintenanceFee=p.maintenanceFee||0;p.maintenancePeriod=p.maintenancePeriod||"";}
    if(newSection==="prospect"){p.prospectAmount=p.prospectAmount||p.amount||0;p.demoReady=p.demoReady||false;p.nextSchedule=p.nextSchedule||"";p.startEstimate=p.startEstimate||"";}
    showToast(`「${p.company}」を${newSection==="active"?"構築中":newSection==="completed"?"完了済み":"見込み"}に移動しました`);
    currentSection=newSection;
  }
}

// 社内PDCA定例（全案件共通）の一覧を集計
function getInternalMeetingDates(){
  const set=new Set();
  projects.forEach(p=>{
    if(p.section==="active"||p.section==="completed"){
      (p.meetings||[]).forEach(mt=>{if((mt.mtgType||"customer")==="internal"&&mt.date)set.add(mt.date);});
    }
  });
  return [...set].sort();
}
function renderInternalMeetingList(){
  const el=document.getElementById("internal-mtg-list");
  if(!el)return;
  const dates=getInternalMeetingDates();
  el.innerHTML=dates.length
    ? dates.map(d=>`<span class="internal-mtg-tag">${fd(d)}<button onclick="removeInternalMeetingAll('${d}')" title="全案件から削除">×</button></span>`).join("")
    : `<span style="font-size:12px;color:var(--color-text3)">まだ登録がありません</span>`;
}
async function addInternalMeetingAll(){
  const date=document.getElementById("internal-mtg-date").value;
  if(!date){alert("日程を選択してください");return;}
  const targets=projects.filter(p=>p.section==="active"||p.section==="completed");
  let added=0;
  for(const p of targets){
    if(!p.meetings)p.meetings=[];
    if(!p.meetings.some(m=>m.date===date&&(m.mtgType||"customer")==="internal")){
      p.meetings.push({id:nextMtgId++,date,mtgType:"internal",tasks:[]});
      if(!p.mtg)p.mtg=[];
      if(!p.mtg.includes(date)){p.mtg.push(date);p.mtg.sort();}
      added++;
    }
  }
  document.getElementById("internal-mtg-date").value="";
  // 全案件を保存
  setSyncState("syncing","全案件に社内定例を追加中…");
  for(const p of targets){await gasRequest({action:"save",project:p});}
  setSyncState("ok","保存完了 — "+new Date().toLocaleTimeString("ja-JP"));
  showToast(`✓ ${added}件の案件に社内定例（${fd(date)}）を追加しました`);
  renderInternalMeetingList();
  renderWorkerAll();
}
async function removeInternalMeetingAll(date){
  if(!confirm(`社内定例（${fd(date)}）を全案件から削除しますか？ぶら下がるタスクも消えます。`))return;
  const targets=projects.filter(p=>p.section==="active"||p.section==="completed");
  for(const p of targets){
    const before=(p.meetings||[]).length;
    p.meetings=(p.meetings||[]).filter(m=>!(m.date===date&&(m.mtgType||"customer")==="internal"));
    if(p.meetings.length!==before)await gasRequest({action:"save",project:p});
  }
  showToast("社内定例を全案件から削除しました");
  renderInternalMeetingList();
  renderWorkerAll();
}

          ${p.person?`<span>担当：${p.person}</span>`:""}
          ${nm?`<span>次回MTG：${fd(nm.date)}</span>`:""}
        </div>
        <div>${pendBadge}</div>
        <button class="wrow-cred-btn" onclick="toggleCredPanel(${p.id})"><i class="ti ti-key"></i> ログイン情報</button>
        <div id="w-creds-${p.id}" style="display:none;margin-top:6px">${renderCredentials(p,p.id)}</div>
      </div>
      <div class="wrow-right">
        <div class="wrow-cols">
          <div>
            <div class="wcol-title"><i class="ti ti-calendar-event"></i> 定例日程ごとのタスク</div>
            <div class="mtg-add-bar" style="margin-bottom:8px">
              <span style="font-size:11px;color:#1F5C8B;font-weight:600;display:flex;align-items:center">お客様定例</span>
              <input type="date" id="mtg-new-date-${p.id}" style="font-size:12px">
              <button class="btn btn-sm btn-primary" onclick="addMeeting(${p.id})"><i class="ti ti-plus"></i></button>
            </div>
            <div id="w-meetings-${p.id}">${renderMeetings(p)}</div>
            <div style="margin-top:10px">
              <div class="wcol-title"><i class="ti ti-clock-exclamation"></i> 次回繰越</div>
              <div id="w-carryover-${p.id}">${renderCarryover(p)}</div>
            </div>
          </div>
          <div>
            <div class="wcol-title"><i class="ti ti-refresh"></i> PDCA・修正項目</div>
            <div id="w-fixes-${p.id}">${renderWorkerFixes(p)}</div>
            <div class="task-add-grid" style="margin-top:6px">
              <input id="wf-title-${p.id}" placeholder="修正項目…" onkeydown="if(event.key==='Enter')addWorkerFix(${p.id})">
              <button class="btn btn-sm btn-primary" onclick="addWorkerFix(${p.id})" style="grid-column:span 3"><i class="ti ti-plus"></i> 追加</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}
function toggleCredPanel(pid){
  const el=document.getElementById("w-creds-"+pid);
  el.style.display=el.style.display==="none"?"block":"none";
}

// 1社分の入力本体（アコーディオン内）

  <div class="wsection" style="margin-top:1rem">
    <div class="wsection-title"><i class="ti ti-calendar-event"></i> 定例日程ごとのタスク</div>
    <div class="mtg-add-bar">
      <select id="mtg-new-type-${p.id}" style="font-size:13px;padding:7px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);outline:none;font-family:var(--font-sans)">
        <option value="customer">お客様定例</option>
        <option value="internal">社内定例</option>
      </select>
      <input type="date" id="mtg-new-date-${p.id}">

    </div>
    <div id="w-meetings-${p.id}">${renderMeetings(p)}</div>
  </div>

  <div class="wsection">
    <div class="wsection-title"><i class="ti ti-refresh"></i> PDCA・修正項目</div>

    <div class="task-add-grid">
      <input id="wf-title-${p.id}" placeholder="修正項目…" onkeydown="if(event.key==='Enter')addWorkerFix(${p.id})">
      <button class="btn btn-sm btn-primary" onclick="addWorkerFix(${p.id})" style="grid-column:span 3"><i class="ti ti-plus"></i> 追加</button>
    </div>
  </div>

  <div class="wsection">
    <div class="wsection-title"><i class="ti ti-clock-exclamation"></i> 次回繰越タスク一覧</div>

  </div>

  <div class="wsection" style="margin-bottom:0">
    <div class="wsection-title"><i class="ti ti-key"></i> システムのログイン情報 <span style="font-size:10px;color:var(--color-text3);font-weight:400">（管理者・担当者のみ閲覧）</span></div>
    <div id="w-creds-${p.id}">${renderCredentials(p,p.id)}</div>

// --- 定例日程ごとのタスク ---
function renderMeetings(p){
  const typeLabel={customer:"お客様定例",internal:"社内定例"};
  const typeCls={customer:"mtg-type-customer",internal:"mtg-type-internal"};
  const meetings=(p.meetings||[]).slice().sort((a,b)=>{
    // お客様定例を先、その中で日付降順
    if((a.mtgType||"customer")!==(b.mtgType||"customer"))return (a.mtgType==="internal")?1:-1;
    return (b.date||"").localeCompare(a.date||"");
  });
  if(!meetings.length)return `<div style="font-size:13px;color:var(--color-text3);text-align:center;padding:1rem">定例日程がありません。上の欄から追加してください。</div>`;
  return meetings.map(mt=>{
    const tp=mt.mtgType||"customer";
    const tasks=mt.tasks||[];
    const pending=tasks.filter(t=>t.status!=="完了").length;
    const taskRows=tasks.length?tasks.map(t=>`
      <div class="mtg-task-item ${t.status==="完了"?"done":""}">
        <span class="tt">${t.title}</span>
        <button class="task-status-btn ${tcls[t.status]||"tb-todo"}" onclick="cycleTaskStatus(${p.id},${mt.id},${t.id})">${t.status}</button>
        <button class="ico-btn" onclick="deleteMtgTask(${p.id},${mt.id},${t.id})"><i class="ti ti-x"></i></button>
      </div>`).join(""):`<div style="font-size:12px;color:var(--color-text3);padding:6px 0">タスクなし</div>`;
    return `<div class="mtg-block">
      <div class="mtg-block-head">
        <span class="mtg-type ${typeCls[tp]}">${typeLabel[tp]}</span>
        <span class="mtg-date">${fd(mt.date)}</span>
        <span class="mtg-count">${tasks.length?`${pending}件残り / ${tasks.length}件`:"タスクなし"}</span>
        <button class="ico-btn" style="margin-left:auto" onclick="deleteMeeting(${p.id},${mt.id})"><i class="ti ti-trash"></i></button>
      </div>
      <div class="mtg-block-body">
        ${taskRows}
        <div class="mtg-task-add">
          <input id="mt-task-${mt.id}" placeholder="この定例で発生したタスク…" onkeydown="if(event.key==='Enter')addMtgTask(${p.id},${mt.id})">
          <button class="btn btn-sm" onclick="addMtgTask(${p.id},${mt.id})"><i class="ti ti-plus"></i> 追加</button>
        </div>
      </div>
    </div>`;
  }).join("");
}
async function addMeeting(pid){
  const p=projects.find(x=>x.id===pid);
  const date=document.getElementById("mtg-new-date-"+pid).value;
  const mtgType="customer"; // 個別追加はお客様定例のみ（社内は上部一括）
  if(!date){alert("日程を選択してください");return;}
  if(!p.meetings)p.meetings=[];
  if(p.meetings.some(m=>m.date===date&&(m.mtgType||"customer")===mtgType)){alert("同じ日程がすでにあります");return;}
  p.meetings.push({id:nextMtgId++,date,mtgType,tasks:[]});
  if(!p.mtg)p.mtg=[];
  if(!p.mtg.includes(date)){p.mtg.push(date);p.mtg.sort();}
  document.getElementById("mtg-new-date-"+pid).value="";
  document.getElementById("w-meetings-"+pid).innerHTML=renderMeetings(p);
  await saveProjectToGAS(p);
}
async function deleteMeeting(pid,mid){
  if(!confirm("この定例日程とぶら下がるタスクを削除しますか？"))return;
  const p=projects.find(x=>x.id===pid);
  const mt=p.meetings.find(m=>m.id===mid);
  p.meetings=p.meetings.filter(m=>m.id!==mid);
  if(mt&&p.mtg)p.mtg=p.mtg.filter(d=>d!==mt.date);
  document.getElementById("w-meetings-"+pid).innerHTML=renderMeetings(p);
  await saveProjectToGAS(p);
}
async function addMtgTask(pid,mid){
  const p=projects.find(x=>x.id===pid);
  const mt=p.meetings.find(m=>m.id===mid);
  const input=document.getElementById("mt-task-"+mid);
  const title=input.value.trim();if(!title)return;
  if(!mt.tasks)mt.tasks=[];
  mt.tasks.push({id:nextTaskId++,title,status:"未対応"});
  document.getElementById("w-meetings-"+pid).innerHTML=renderMeetings(p);
  await saveProjectToGAS(p);
}
async function cycleTaskStatus(pid,mid,tid){
  const p=projects.find(x=>x.id===pid);
  const mt=p.meetings.find(m=>m.id===mid);
  const t=mt.tasks.find(x=>x.id===tid);
  t.status=TASK_NEXT[t.status]||"未対応";
  document.getElementById("w-meetings-"+pid).innerHTML=renderMeetings(p);
  const co=document.getElementById("w-carryover-"+pid);if(co)co.innerHTML=renderCarryover(p);
  await saveProjectToGAS(p);
}
async function deleteMtgTask(pid,mid,tid){
  const p=projects.find(x=>x.id===pid);
  const mt=p.meetings.find(m=>m.id===mid);
  mt.tasks=mt.tasks.filter(x=>x.id!==tid);
  document.getElementById("w-meetings-"+pid).innerHTML=renderMeetings(p);
  await saveProjectToGAS(p);
}
// 次回繰越タスク一覧（全定例から status==="次回繰越" を集約）
function renderCarryover(p){
  const typeLabel={customer:"お客様定例",internal:"社内定例"};
  const items=[];
  (p.meetings||[]).forEach(mt=>{
    (mt.tasks||[]).forEach(t=>{if(t.status==="次回繰越")items.push({date:mt.date,title:t.title,mtgType:mt.mtgType||"customer"});});
  });
  if(!items.length)return `<div style="font-size:13px;color:var(--color-text3);text-align:center;padding:1rem">次回繰越のタスクはありません</div>`;
  items.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  return items.map(it=>`<div class="mtg-task-item">
    <span class="tt">${it.title}</span>
    <span class="task-status-btn tb-carry">次回繰越</span>
    <span class="task-date-val">${typeLabel[it.mtgType]} ${fd(it.date)}</span>
  </div>`).join("");
}

// --- 作業者の修正項目（既存fixesと共通） ---
function renderWorkerFixes(p){
  const fixes=p.fixes||[];
  if(!fixes.length)return `<div style="font-size:13px;color:var(--color-text3);text-align:center;padding:1rem">修正項目はありません</div>`;
  return fixes.map((f,i)=>`<div class="task-item ${f.done?"done":""}" style="grid-template-columns:auto 1fr auto">
    <div class="task-check" onclick="toggleWorkerFix(${p.id},${i})">${f.done?'<i class="ti ti-check" style="font-size:12px"></i>':''}</div>
    <div class="task-title ${f.done?"strike":""}">${f.title}</div>
    <button class="ico-btn" onclick="deleteWorkerFix(${p.id},${i})"><i class="ti ti-x"></i></button>
  </div>`).join("");
}
async function addWorkerFix(pid){
  const p=projects.find(x=>x.id===pid);
  const title=document.getElementById("wf-title-"+pid).value.trim();if(!title)return;
  if(!p.fixes)p.fixes=[];
  p.fixes.push({id:nextFixId++,title,note:"",done:false});
  document.getElementById("wf-title-"+pid).value="";
  document.getElementById("w-fixes-"+pid).innerHTML=renderWorkerFixes(p);
  await saveProjectToGAS(p);
}
async function toggleWorkerFix(pid,idx){
  const p=projects.find(x=>x.id===pid);p.fixes[idx].done=!p.fixes[idx].done;
  document.getElementById("w-fixes-"+pid).innerHTML=renderWorkerFixes(p);
  await saveProjectToGAS(p);
}
async function deleteWorkerFix(pid,idx){
  const p=projects.find(x=>x.id===pid);p.fixes.splice(idx,1);
  document.getElementById("w-fixes-"+pid).innerHTML=renderWorkerFixes(p);
  await saveProjectToGAS(p);
}

// --- 未対応繰越（dueがあって未完了のtask/fix） ---
// --- ログイン情報（パスコード保護） ---
function renderCredentials(p,pid){
  if(!unlockedCreds[pid]){
    return `<div class="cred-locked">
      <i class="ti ti-lock" style="font-size:28px;color:var(--color-text3);display:block;margin-bottom:8px"></i>
      <div style="font-size:13px;color:var(--color-text2);margin-bottom:12px">ログイン情報は保護されています</div>
      <button class="btn btn-primary btn-sm" onclick="requestPasscode(${pid})"><i class="ti ti-lock-open"></i> パスコードで表示</button>
    </div>`;
  }
  const creds=p.credentials||[];
  const list=creds.length?creds.map((c,i)=>`
    <div class="cred-item">
      <div class="cred-item-head">
        <i class="ti ti-server" style="color:var(--color-primary-m)"></i>
        <strong>${c.system||"(システム名未設定)"}</strong>
        <button class="ico-btn" onclick="deleteCred(${pid},${i})"><i class="ti ti-x"></i></button>
      </div>
      ${c.url?`<div class="cred-row"><span class="ck">URL</span><span class="cv">${c.url}</span><button class="copy-btn" onclick="copyText('${escq(c.url)}')">コピー</button></div>`:""}
      <div class="cred-row"><span class="ck">ID</span><span class="cv">${c.username||"–"}</span>${c.username?`<button class="copy-btn" onclick="copyText('${escq(c.username)}')">コピー</button>`:""}</div>
      <div class="cred-row"><span class="ck">PW</span><span class="cv">${c.password||"–"}</span>${c.password?`<button class="copy-btn" onclick="copyText('${escq(c.password)}')">コピー</button>`:""}</div>
      ${c.note?`<div style="font-size:11px;color:var(--color-text2);margin-top:4px">${c.note}</div>`:""}
    </div>`).join(""):`<div style="font-size:13px;color:var(--color-text3);text-align:center;padding:1rem">ログイン情報は未登録です</div>`;
  return `${list}
    <div style="border:1px dashed var(--color-border2);border-radius:var(--radius-sm);padding:10px;margin-top:8px">
      <div class="wfield"><input id="cr-system-${pid}" placeholder="システム名（例: kintone）"></div>
      <div class="wfield"><input id="cr-url-${pid}" placeholder="URL（任意）"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div class="wfield"><input id="cr-user-${pid}" placeholder="ID"></div>
        <div class="wfield"><input id="cr-pass-${pid}" placeholder="パスワード"></div>
      </div>
      <div class="wfield"><input id="cr-note-${pid}" placeholder="備考（任意）"></div>
      <button class="btn btn-sm btn-primary" onclick="addCred(${pid})"><i class="ti ti-plus"></i> ログイン情報を追加</button>
    </div>`;
}
function escq(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function copyText(t){navigator.clipboard.writeText(t).then(()=>showToast("コピーしました"));}
function requestPasscode(pid){
  pendingCredProjectId=pid;
  document.getElementById("passcode-input").value="";
  document.getElementById("passcode-error").style.display="none";
  document.getElementById("passcode-modal").classList.add("open");
  setTimeout(()=>document.getElementById("passcode-input").focus(),100);
}
function checkPasscode(){
  const v=document.getElementById("passcode-input").value;
  if(v===PASSCODE){
    unlockedCreds[pendingCredProjectId]=true;
    document.getElementById("passcode-modal").classList.remove("open");
    const p=projects.find(x=>x.id===pendingCredProjectId);
    const el=document.getElementById("w-creds-"+pendingCredProjectId);
    if(el&&p){el.innerHTML=renderCredentials(p,pendingCredProjectId);el.style.display="block";}
  }else{
    document.getElementById("passcode-error").style.display="block";
  }
}
async function addCred(pid){
  const p=projects.find(x=>x.id===pid);
  const system=document.getElementById("cr-system-"+pid).value.trim();
  if(!system){alert("システム名を入力してください");return;}
  if(!p.credentials)p.credentials=[];
  p.credentials.push({id:nextCredId++,system,url:document.getElementById("cr-url-"+pid).value.trim(),username:document.getElementById("cr-user-"+pid).value.trim(),password:document.getElementById("cr-pass-"+pid).value.trim(),note:document.getElementById("cr-note-"+pid).value.trim()});
  document.getElementById("w-creds-"+pid).innerHTML=renderCredentials(p,pid);
  await saveProjectToGAS(p);
  showToast("✓ ログイン情報を追加しました");
}
async function deleteCred(pid,idx){
  if(!confirm("このログイン情報を削除しますか？"))return;
  const p=projects.find(x=>x.id===pid);p.credentials.splice(idx,1);
  document.getElementById("w-creds-"+pid).innerHTML=renderCredentials(p,pid);
  await saveProjectToGAS(p);
}

// ============================================================
//  管理者：作業者の入力を見る（集約ビュー）
// ============================================================
function renderWorkerInputSummary(){
  const area=document.getElementById("admin-worker-input-area");
  const targets=projects.filter(p=>(p.section==="active"||p.section==="completed"));
  const withInput=targets.filter(p=>(p.meetings&&p.meetings.length)||(p.fixes&&p.fixes.length));
  if(!withInput.length){
    area.innerHTML=`<div class="wcard" style="text-align:center;color:var(--color-text2);font-size:13px;padding:2.5rem">作業者からの入力はまだありません</div>`;
    return;
  }
  area.innerHTML=withInput.map(p=>{
    const meetings=(p.meetings||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    const fixes=p.fixes||[];
    const fixDone=fixes.filter(f=>f.done).length;
    // 定例ごとのブロック（閲覧専用）
    const mtgBlocks=meetings.length?meetings.map(mt=>{
      const tp=mt.mtgType||"customer";
      const typeLabel={customer:"お客様定例",internal:"社内定例"};
      const typeCls={customer:"mtg-type-customer",internal:"mtg-type-internal"};
      const tasks=mt.tasks||[];
      const pending=tasks.filter(t=>t.status!=="完了").length;
      const taskRows=tasks.length?tasks.map(t=>`
        <div class="mtg-task-item ${t.status==="完了"?"done":""}">
          <span class="tt">${t.title}</span>
          <span class="task-status-btn ${tcls[t.status]||"tb-todo"}">${t.status}</span>
        </div>`).join(""):`<div style="font-size:12px;color:var(--color-text3);padding:6px 0">タスクなし</div>`;
      return `<div class="mtg-block">
        <div class="mtg-block-head">
          <span class="mtg-type ${typeCls[tp]}">${typeLabel[tp]}</span>
          <span class="mtg-date">${fd(mt.date)}</span>
          <span class="mtg-count">${tasks.length?`${pending}件残り / ${tasks.length}件`:"タスクなし"}</span>
        </div>
        <div class="mtg-block-body">${taskRows}</div>
      </div>`;
    }).join(""):`<div style="font-size:12px;color:var(--color-text3);padding:6px">定例日程なし</div>`;
    const fixRows=fixes.length?fixes.map(f=>`
      <div class="mtg-task-item ${f.done?"done":""}">
        <span class="tt">${f.title}</span>
        <span class="task-status-btn ${f.done?"tb-done":"tb-todo"}">${f.done?"完了":"未完了"}</span>
      </div>`).join(""):`<div style="font-size:12px;color:var(--color-text3);padding:6px">修正項目なし</div>`;
    return `<div class="wcard">
      <div class="wcard-head">
        <i class="ti ti-building" style="color:var(--color-primary-m)"></i>
        <h3>${p.company}</h3>
        <span style="font-size:12px;color:var(--color-text2)">${p.person||""}</span>
      </div>
      <div class="wsection">
        <div class="wsection-title"><i class="ti ti-calendar-event"></i> 定例日程ごとのタスク</div>
        ${mtgBlocks}
      </div>
      <div class="wsection" style="margin-bottom:0">
        <div class="wsection-title"><i class="ti ti-refresh"></i> PDCA・修正項目 <span style="font-size:11px;font-weight:400;color:var(--color-text2)">(${fixDone}/${fixes.length}完了)</span></div>
        ${fixRows}
      </div>
    </div>`;
  }).join("");
}
