<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI案件進捗管理 | Ai・よろ</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;
  --color-primary:#4A4A4A;--color-primary-d:#2B2B2B;--color-primary-m:#6B6B6B;
  --color-primary-l:#E8E8E8;--color-primary-p:#F4F4F4;
  --color-bg:#FFFFFF;--color-bg2:#F7F7F7;--color-bg3:#EEEEEE;
  --color-text:#1E1E1E;--color-text2:#6B6B6B;--color-text3:#AAAAAA;
  --color-border:#E0E0E0;--color-border2:#CCCCCC;
  --color-warn:#7A6A3A;--color-warn-bg:#F5F0E0;
  --color-ok-bg:#EAF2EA;--color-ok:#2A5E2A;
  --radius:9px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-bg2);color:var(--color-text);min-height:100vh}
.app{max-width:1380px;margin:0 auto;padding:1.5rem 1rem}
.app-header{display:flex;align-items:center;gap:16px;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--color-border)}
.logo-mark{width:40px;height:40px;border-radius:8px;background:var(--color-primary-d);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.app-header h1{font-size:18px;font-weight:700;color:var(--color-primary-d)}
.app-header .subtitle{font-size:12px;color:var(--color-text2);margin-top:2px}
.sync-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;font-size:12px;color:var(--color-text2);background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:7px 12px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#5BAD72;flex-shrink:0}
.sync-dot.syncing{background:#B8A060;animation:pulse 1s infinite}
.sync-dot.error{background:#B05050}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* サマリー */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px;margin-bottom:1.25rem}
.metric{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius);padding:.8rem 1rem}
.metric .label{font-size:11px;color:var(--color-text2);margin-bottom:4px;font-weight:500}
.metric .val{font-size:20px;font-weight:700;color:var(--color-primary-d)}
.metric.hi{background:var(--color-primary-p);border-color:var(--color-primary-l)}

/* タブ */
.section-tabs{display:flex;gap:0;border-bottom:2px solid var(--color-border);margin-bottom:1rem}
.section-tab{font-size:14px;padding:10px 22px;cursor:pointer;color:var(--color-text2);border-bottom:3px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);font-weight:500;margin-bottom:-2px;transition:.15s;display:flex;align-items:center;gap:6px}
.section-tab.active{color:var(--color-primary-d);border-bottom-color:var(--color-primary-d);font-weight:700}
.section-tab:hover:not(.active){color:var(--color-primary-d);background:var(--color-primary-p)}
.section-tab .tab-count{font-size:11px;padding:1px 7px;border-radius:10px;background:var(--color-primary-l);color:var(--color-primary-m);font-weight:600}
.section-tab.active .tab-count{background:var(--color-primary-d);color:#fff}

/* フィルター */
.filter-row{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
.filter-row input,.filter-row select{font-size:13px;padding:7px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);outline:none;font-family:var(--font-sans)}
.filter-row input{flex:1;min-width:150px}

/* ボタン */
.btn{font-size:13px;padding:7px 14px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;font-family:var(--font-sans);font-weight:500;transition:all .15s}
.btn:hover{background:var(--color-bg2)}
.btn-primary{background:var(--color-primary-d);color:#fff;border-color:var(--color-primary-d)}
.btn-primary:hover{background:var(--color-primary)}
.btn-sm{font-size:12px;padding:4px 10px}

/* テーブル共通 */
.table-wrap{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius);overflow:auto;box-shadow:0 1px 4px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 11px;font-weight:600;font-size:11px;color:var(--color-text2);border-bottom:1px solid var(--color-border);background:var(--color-primary-p);white-space:nowrap;letter-spacing:.04em;cursor:pointer;user-select:none}
th:hover{background:var(--color-primary-l)}
td{padding:9px 11px;border-bottom:1px solid var(--color-border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-bg2)}
.company-link{color:var(--color-primary-d);cursor:pointer;font-weight:600;border-bottom:1px solid var(--color-border2)}
.company-link:hover{color:var(--color-primary)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.b-todo{background:#EBEBEB;color:#555}
.b-wip{background:#E8F0E8;color:#2A5E2A;border:1px solid #C0D8C0}
.b-review{background:#EAE8F0;color:#3A3070}
.b-done{background:var(--color-primary-d);color:#fff}
.b-hold{background:#F0F0F0;color:#888}
.fix-pending{background:var(--color-warn-bg);color:var(--color-warn);font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}
.fix-all-done{background:var(--color-ok-bg);color:var(--color-ok);font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}
.fix-none{color:var(--color-text3);font-size:12px}
.deadline-warn{color:var(--color-warn);font-weight:600}
.deadline-over{color:#B05050;font-weight:600}
.prog-wrap{display:flex;align-items:center;gap:6px}
.prog-bar{flex:1;height:5px;background:var(--color-bg3);border-radius:3px;overflow:hidden;min-width:40px}
.prog-fill{height:100%;border-radius:3px;background:var(--color-primary)}
.prog-val{font-size:11px;color:var(--color-text2);min-width:26px}
.ico-btn{background:none;border:none;cursor:pointer;color:var(--color-text3);padding:3px 5px;border-radius:4px;font-size:15px}
.ico-btn:hover{color:var(--color-primary-d);background:var(--color-primary-p)}
.empty{text-align:center;padding:3rem;color:var(--color-text2);font-size:13px}
/* メモ：省略なし、折り返し表示 */
.memo-cell{font-size:12px;color:var(--color-text2);max-width:200px;word-break:break-all;white-space:pre-wrap;line-height:1.5}
.mtg-next{font-size:12px;white-space:nowrap}
.mtg-next.soon{color:var(--color-warn);font-weight:600}
.mtg-next.past{color:var(--color-text3)}
/* 見込みバッジ */
.prospect-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.pb-demo-ok{background:#E8F0E8;color:#2A5E2A}
.pb-demo-ng{background:#EBEBEB;color:#666}
.pb-hot{background:var(--color-warn-bg);color:var(--color-warn)}
/* 保守バッジ */
.maintenance-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;background:#EAE8F0;color:#3A3070}

/* パネル */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50}
.overlay.open{display:block}
.panel{position:fixed;top:0;right:0;width:min(580px,100vw);height:100vh;background:var(--color-bg);border-left:1px solid var(--color-border);z-index:51;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-4px 0 24px rgba(0,0,0,.08)}
.panel.open{transform:translateX(0)}
.panel-header{padding:1.25rem;border-bottom:1px solid var(--color-border);display:flex;align-items:flex-start;gap:8px;flex-shrink:0;background:var(--color-primary-p)}
.panel-header h2{font-size:16px;font-weight:700;flex:1;line-height:1.4;color:var(--color-primary-d)}
.panel-close{background:none;border:none;cursor:pointer;color:var(--color-text2);font-size:20px;padding:0}
.ptabs{display:flex;border-bottom:1px solid var(--color-border);flex-shrink:0;overflow-x:auto}
.ptab{font-size:13px;padding:9px 15px;cursor:pointer;color:var(--color-text2);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);font-weight:500;white-space:nowrap}
.ptab.active{color:var(--color-primary-d);border-bottom-color:var(--color-primary-d);font-weight:700}
.ptab:hover:not(.active){color:var(--color-primary-d);background:var(--color-primary-p)}
.panel-body{padding:1.25rem;flex:1;overflow-y:auto}
.section{margin-bottom:1.5rem}
.section-title{font-size:11px;font-weight:700;color:var(--color-primary-d);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.section-title::before{content:"";display:block;width:3px;height:13px;background:var(--color-primary);border-radius:2px}
.edit-field{margin-bottom:10px}
.edit-field label{display:block;font-size:12px;color:var(--color-text2);margin-bottom:4px;font-weight:500}
.edit-field input,.edit-field select,.edit-field textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);outline:none}
.edit-field input:focus,.edit-field select:focus,.edit-field textarea:focus{border-color:var(--color-primary);box-shadow:0 0 0 2px var(--color-primary-p)}
.edit-field textarea{resize:vertical;min-height:70px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mtg-item{display:inline-flex;align-items:center;gap:4px;background:var(--color-primary-p);color:var(--color-primary-d);font-size:12px;padding:3px 8px;border-radius:4px;margin:2px;font-weight:500;border:1px solid var(--color-primary-l)}
.mtg-item button{background:none;border:none;cursor:pointer;color:var(--color-primary-m);font-size:13px;padding:0;line-height:1}
.add-row{display:flex;gap:6px;margin-top:6px}
.add-row input{flex:1;font-size:13px;padding:6px 9px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);outline:none}
.timeline{border-left:2px solid var(--color-primary-l);padding-left:1rem;margin-top:.5rem}
.tl-item{position:relative;margin-bottom:.75rem}
.tl-item::before{content:"";position:absolute;left:-1.35rem;top:.35rem;width:8px;height:8px;border-radius:50%;background:var(--color-border2)}
.tl-item.past::before{background:#5BAD72}
.tl-item.soon::before{background:#B8A060}
.tl-item.over::before{background:#B05050}
.tl-date{font-size:11px;color:var(--color-text2)}
.tl-label{font-size:13px;font-weight:600}
.save-bar{padding:1rem 1.25rem;border-top:1px solid var(--color-border);display:flex;gap:8px;justify-content:flex-end;background:var(--color-bg);flex-shrink:0}

/* 修正項目 */
.fix-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--color-border);border-radius:var(--radius-sm);margin-bottom:6px;transition:.15s;cursor:pointer}
.fix-item:hover{border-color:var(--color-primary-l);background:var(--color-primary-p)}
.fix-item.done-item{opacity:.5}
.fix-check{width:18px;height:18px;border:2px solid var(--color-border2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;background:var(--color-bg)}
.fix-item.done-item .fix-check{background:var(--color-primary-d);border-color:var(--color-primary-d);color:#fff}
.fix-item-left{flex:1;min-width:0}
.fix-item-title{font-size:13px;font-weight:500;margin-bottom:2px;word-break:break-word;line-height:1.5}
.fix-item-title.strikethrough{text-decoration:line-through;color:var(--color-text2)}
.fix-note{font-size:12px;color:var(--color-text2);font-style:italic}
.fix-progress{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--color-primary-p);border-radius:var(--radius-sm);margin-bottom:10px}
.fix-progress-bar{flex:1;height:6px;background:var(--color-bg3);border-radius:3px;overflow:hidden}
.fix-progress-fill{height:100%;border-radius:3px;background:var(--color-primary);transition:width .4s}
.fix-progress-label{font-size:12px;color:var(--color-text2);white-space:nowrap;font-weight:500}
.ai-paste-box{border:1.5px dashed var(--color-border2);border-radius:var(--radius-sm);padding:12px;background:var(--color-bg2);margin-bottom:12px}
.ai-paste-box textarea{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);resize:vertical;min-height:70px;outline:none;margin-bottom:8px}
.ai-hint{font-size:12px;color:var(--color-text2);margin-bottom:8px;line-height:1.6}

/* モーダル */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--color-bg);border-radius:var(--radius);padding:1.5rem;width:min(520px,94vw);border:1px solid var(--color-border);max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.modal-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--color-border)}
.modal-header h2{font-size:16px;font-weight:700;color:var(--color-primary-d);flex:1}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--color-primary-d);color:#fff;padding:10px 22px;border-radius:6px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.hint{padding:10px 12px;background:var(--color-primary-p);border-radius:var(--radius-sm);font-size:12px;color:var(--color-text2);border:1px solid var(--color-primary-l)}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="logo-mark">Ai</div>
    <div>
      <h1>Ai・よろ 案件進捗管理</h1>
      <div class="subtitle">Googleスプレッドシートとリアルタイム同期</div>
    </div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">接続中…</span>
    <button class="btn btn-sm" onclick="loadFromGAS()" style="margin-left:auto"><i class="ti ti-refresh"></i> 再読み込み</button>
  </div>
  <div class="summary" id="summary"></div>
  <div id="person-summary" style="margin-bottom:1.25rem"></div>

  <!-- セクションタブ -->
  <div class="section-tabs">
    <button class="section-tab active" onclick="switchSection('active')" id="stab-active">
      <i class="ti ti-building"></i> 構築中案件 <span class="tab-count" id="cnt-active">0</span>
    </button>
    <button class="section-tab" onclick="switchSection('completed')" id="stab-completed">
      <i class="ti ti-circle-check"></i> 完了済み案件 <span class="tab-count" id="cnt-completed">0</span>
    </button>
    <button class="section-tab" onclick="switchSection('prospect')" id="stab-prospect">
      <i class="ti ti-star"></i> 見込み案件 <span class="tab-count" id="cnt-prospect">0</span>
    </button>
  </div>

  <!-- フィルター行 -->
  <div class="filter-row">
    <input type="text" id="search" placeholder="🔍 会社名・担当者で検索…">
    <select id="filter-person"><option value="">すべての担当者</option></select>
    <select id="filter-deadline"><option value="">期日：すべて</option><option value="over">期日超過</option><option value="week">7日以内</option><option value="month">30日以内</option></select>
    <select id="filter-fix"><option value="">修正：すべて</option><option value="has">未完了あり</option><option value="done">全完了</option></select>
    <button class="btn btn-sm" onclick="clearFilters()"><i class="ti ti-x"></i> リセット</button>
    <button class="btn btn-primary" id="add-btn" onclick="openAdd()"><i class="ti ti-plus"></i> 案件追加</button>
  </div>

  <!-- テーブルエリア -->
  <div id="table-area"></div>
</div>

<!-- パネル -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <h2 id="panel-company"></h2>
    <button class="panel-close" onclick="closePanel()"><i class="ti ti-x"></i></button>
  </div>
  <div class="ptabs" id="ptabs"></div>
  <div class="panel-body" id="panel-body"></div>
  <div class="save-bar">
    <button class="btn" onclick="closePanel()">閉じる</button>
    <button class="btn btn-primary" id="save-btn" onclick="savePanel()"><i class="ti ti-check"></i> 保存してシート反映</button>
  </div>
</div>

<!-- 追加モーダル -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="logo-mark" style="width:30px;height:30px;font-size:12px">Ai</div>
      <h2 id="add-modal-title">案件を追加</h2>
    </div>
    <div id="add-modal-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAdd()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveAdd()"><i class="ti ti-check"></i> 追加して保存</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbw2TmIA0Cm3_2MI9ziOnZd1_lLP-0EDGE9XxYM0qNsqluprvt9rLME4_8WHHcVMEkUM/exec";

let currentSection="active", sortKey="deadline", sortDir=1;

function fd(d){if(!d)return"–";const p=d.split("-");return p[0]+"/"+(+p[1])+"/"+(+p[2]||"")}
function fa(n){return(!n&&n!==0)||n===0?"–":"¥"+Number(n).toLocaleString()}
function tod(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dcls(d){if(!d)return"";const diff=(new Date(d)-tod())/(864e5);return diff<0?"deadline-over":diff<=14?"deadline-warn":"";}
function nextMtg(mtg){
  if(!mtg||!mtg.length)return null;
  const t=tod();
  const future=mtg.map(m=>new Date(m)).filter(d=>d>=t).sort((a,b)=>a-b);
  return future.length?future[0].toISOString().slice(0,10):null;
}
function tryParse(v){try{return JSON.parse(v);}catch{return[];}}
function setSyncState(s,m){
  document.getElementById("sync-dot").className="sync-dot"+(s==="syncing"?" syncing":s==="error"?" error":"");
  document.getElementById("sync-label").textContent=m;
}
function showToast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}

async function gasRequest(params){
  const url=GAS_URL+"?"+new URLSearchParams({action:params.action});
  const opts=params.action==="getAll"?{method:"GET"}:{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(params)};
  const res=await fetch(url,opts);const json=await res.json();
  if(!json.ok)throw new Error(json.error||"エラー");return json.data;
}
async function loadFromGAS(){
  setSyncState("syncing","スプレッドシートから読み込み中…");
  try{
    const data=await gasRequest({action:"getAll"});
    if(data&&data.length>0){
      projects=data.map(p=>({
        ...p,section:p.section||"active",
        mtg:Array.isArray(p.mtg)?p.mtg:tryParse(p.mtg||"[]"),
        fixes:Array.isArray(p.fixes)?p.fixes:tryParse(p.fixes||"[]"),
        amount:Number(p.amount)||0,progress:Number(p.progress)||0,id:Number(p.id)||0,
        prospectAmount:Number(p.prospectAmount)||0,
        demoReady:p.demoReady==="true"||p.demoReady===true,
        maintenance:p.maintenance==="true"||p.maintenance===true,
      }));
      nextId=Math.max(...projects.map(p=>p.id))+1;
      setSyncState("ok","同期済み — "+new Date().toLocaleTimeString("ja-JP"));
    }else{
      projects=INITIAL_DATA.map(p=>({...p}));nextId=20;
      setSyncState("ok","初期データ読み込み完了");
      for(const p of projects)await gasRequest({action:"save",project:p});
      showToast("✓ 初期データをスプレッドシートに保存しました");
    }
    render();
  }catch(e){
    projects=INITIAL_DATA.map(p=>({...p}));nextId=20;
    setSyncState("error","オフライン — ローカルデータで表示");render();
  }
}
async function saveProjectToGAS(p){
  setSyncState("syncing","保存中…");
  try{await gasRequest({action:"save",project:p});setSyncState("ok","保存完了 — "+new Date().toLocaleTimeString("ja-JP"));showToast("✓ 保存しました");}
  catch(e){setSyncState("error","保存エラー: "+e.message);showToast("⚠ 保存失敗");}
}
async function deleteProjectFromGAS(id){
  try{await gasRequest({action:"delete",id});showToast("削除しました");}catch(e){}
}

  currentSection=s;

    document.getElementById("stab-"+k).classList.toggle("active",k===s);

  document.getElementById("filter-deadline").style.display=s==="prospect"?"none":"";
  document.getElementById("filter-fix").style.display=s==="prospect"?"none":"";
  render();
}

function renderSummary(){
  const active=projects.filter(p=>p.section==="active");
  const comp=projects.filter(p=>p.section==="completed");
  const prosp=projects.filter(p=>p.section==="prospect");
  // 受注金額 = 構築中 + 完了済み（契約済み）
  const rev=active.reduce((s,p)=>s+Number(p.amount||0),0)+comp.reduce((s,p)=>s+Number(p.amount||0),0);
  // 見込み金額 = prospectのみ
  const prospRev=prosp.reduce((s,p)=>s+Number(p.prospectAmount||0),0);
  const pf=active.reduce((s,p)=>s+(p.fixes||[]).filter(f=>!f.done).length,0);
  const near=active.filter(p=>p.deadline&&(new Date(p.deadline)-tod())/(864e5)<=14).length;

  document.getElementById("summary").innerHTML=`
    <div class="metric"><div class="label">構築中</div><div class="val">${active.length}</div></div>
    <div class="metric"><div class="label">完了済み</div><div class="val">${comp.length}</div></div>
    <div class="metric"><div class="label">見込み</div><div class="val">${prosp.length}</div></div>
    <div class="metric hi"><div class="label">受注金額（契約済み）</div><div class="val" style="font-size:13px">¥${rev.toLocaleString()}</div></div>
    <div class="metric hi"><div class="label">見込み金額（契約前）</div><div class="val" style="font-size:13px">¥${prospRev.toLocaleString()}</div></div>
    <div class="metric${near>0?" hi":""}"><div class="label">期日14日以内</div><div class="val" style="color:${near>0?"var(--color-warn)":""}">${near}</div></div>
    <div class="metric${pf>0?" hi":""}"><div class="label">未完了の修正</div><div class="val" style="color:${pf>0?"var(--color-warn)":""}">${pf}</div></div>`;

  // タブカウント更新
  document.getElementById("cnt-active").textContent=active.length;
  document.getElementById("cnt-completed").textContent=comp.length;
  document.getElementById("cnt-prospect").textContent=prosp.length;

  // ===== 担当者別集計 =====
  // 担当者を分解（"神谷さん/高杉" → ["神谷さん","高杉"] のように分割）
  const personMap={};
  [...active,...comp].forEach(p=>{
    const persons=(p.person||"").split(/[\/・,、]/).map(s=>s.trim()).filter(Boolean);
    persons.forEach(name=>{
      if(!personMap[name])personMap[name]={active:0,completed:0,amount:0};
      if(p.section==="active"){personMap[name].active++;personMap[name].amount+=Number(p.amount||0);}
      else{personMap[name].completed++;personMap[name].amount+=Number(p.amount||0);}
    });
  });
  const personEntries=Object.entries(personMap).sort((a,b)=>(b[1].active+b[1].completed)-(a[1].active+a[1].completed));
  if(personEntries.length>0){
    const cards=personEntries.map(([name,d])=>`
      <div style="background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius);padding:.7rem 1rem;display:flex;align-items:center;gap:12px;min-width:0">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--color-primary-d);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${name.slice(0,2)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;color:var(--color-primary-d);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
          <div style="font-size:11px;color:var(--color-text2);margin-top:2px">
            構築中 <strong>${d.active}</strong> 件 &nbsp;完了 <strong>${d.completed}</strong> 件
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:12px;font-weight:700;color:var(--color-primary-d)">¥${d.amount.toLocaleString()}</div>
          <div style="font-size:10px;color:var(--color-text3)">担当合計</div>
        </div>
      </div>`).join("");
    document.getElementById("person-summary").innerHTML=`
      <div style="font-size:11px;font-weight:700;color:var(--color-text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.6rem">担当者別案件数</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">${cards}</div>`;
  } else {
    document.getElementById("person-summary").innerHTML="";
  }
}

function clearFilters(){
  ["search","filter-person","filter-deadline","filter-fix"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  render();
}

function render(){
  renderSummary();renderPersonFilter();
  const q=(document.getElementById("search").value||"").toLowerCase();
  const fp=document.getElementById("filter-person").value;
  const fd2=document.getElementById("filter-deadline").value;
  const ff=document.getElementById("filter-fix").value;
  const t=tod();

  let list=projects.filter(p=>{
    if(p.section!==currentSection)return false;
    if(q&&!p.company.toLowerCase().includes(q)&&!(p.person||"").toLowerCase().includes(q))return false;
    if(fp&&p.person!==fp)return false;
    if(currentSection==="active"){
      if(fd2){
        if(!p.deadline)return false;
        const diff=(new Date(p.deadline)-t)/(864e5);
        if(fd2==="over"&&diff>=0)return false;
        if(fd2==="week"&&(diff<0||diff>7))return false;
        if(fd2==="month"&&(diff<0||diff>30))return false;
      }
      if(ff){
        const fixes=p.fixes||[];
        const pending=fixes.filter(f=>!f.done).length;
        if(ff==="has"&&pending===0)return false;
        if(ff==="done"&&(fixes.length===0||pending>0))return false;
      }
    }
    return true;
  });

  list.sort((a,b)=>{
    let av=a[sortKey]??"",bv=b[sortKey]??"";
    if(sortKey==="amount"||sortKey==="progress"||sortKey==="prospectAmount"){av=Number(av);bv=Number(bv);}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });

  const area=document.getElementById("table-area");
  if(!list.length){area.innerHTML=`<div class="table-wrap"><div class="empty">該当する案件がありません</div></div>`;return;}

  if(currentSection==="active") area.innerHTML=renderActiveTable(list);
  else if(currentSection==="completed") area.innerHTML=renderCompletedTable(list);
  else area.innerHTML=renderProspectTable(list);
}

    const nm=nextMtg(p.mtg||[]);

function openPanel(id){
  panelId=id;currentPTab="info";
  const p=projects.find(x=>x.id===id);
  document.getElementById("panel-company").textContent=p.company;
  buildPTabs(p);renderPTab(p);
  document.getElementById("overlay").classList.add("open");
  document.getElementById("panel").classList.add("open");
}
function buildPTabs(p){
  const tabs=p.section==="prospect"
    ?[["info","案件情報"],["timeline","タイムライン"]]
    :[["info","案件情報"],["fixes",`修正項目 ${p.fixes&&p.fixes.length?"("+p.fixes.filter(f=>!f.done).length+"残り)":""}`],["timeline","タイムライン"]];
  document.getElementById("ptabs").innerHTML=tabs.map(([k,l])=>`<button class="ptab${k===currentPTab?" active":""}" onclick="switchPTab('${k}')">${l}</button>`).join("");
  document.getElementById("save-btn").style.display=currentPTab==="info"?"inline-flex":"none";
}
function switchPTab(tab){
  if(currentPTab==="info"&&tab!=="info")collectInfoFields();
  currentPTab=tab;
  const p=projects.find(x=>x.id===panelId);
  buildPTabs(p);renderPTab(p);
}
function renderPTab(p){
  if(currentPTab==="info"){
    if(p.section==="active")renderInfoActive(p);
    else if(p.section==="completed")renderInfoCompleted(p);
    else renderInfoProspect(p);
  }else if(currentPTab==="fixes")renderFixes(p);
  else renderTimeline(p);
}

  const el=document.getElementById("mtg-list");if(!el)return;
  el.innerHTML=(p.mtg||[]).map((m,i)=>`<span class="mtg-item">${fd(m)}<button onclick="removeMtg(${i})">×</button></span>`).join("");
}

function renderFixes(p){
  const fixes=p.fixes||[],total=fixes.length,done=fixes.filter(f=>f.done).length,pending=total-done;
  const pct=total?Math.round(done/total*100):0;
  const rows=fixes.length?fixes.map((f,i)=>`
    <div class="fix-item${f.done?" done-item":""}" onclick="toggleFix(${i})">
      <div class="fix-check">${f.done?'<i class="ti ti-check" style="font-size:12px"></i>':''}</div>
      <div class="fix-item-left">
        <div class="fix-item-title${f.done?" strikethrough":""}">${f.title}</div>
        ${f.note?`<div class="fix-note">${f.note}</div>`:""}
      </div>
      <button class="ico-btn" onclick="event.stopPropagation();deleteFix(${i})"><i class="ti ti-x"></i></button>
    </div>`).join(""):`<div style="font-size:13px;color:var(--color-text2);text-align:center;padding:1.5rem 0">修正項目はありません</div>`;
  document.getElementById("panel-body").innerHTML=`
    <div class="section">
      ${total>0?`<div class="fix-progress"><div class="fix-progress-bar"><div class="fix-progress-fill" style="width:${pct}%"></div></div><span class="fix-progress-label">${done}/${total} 完了 (${pct}%)</span></div>`:""}
      <div class="ai-paste-box">
        <div class="ai-hint">📋 議事録・文字起こしをペースト → AIが修正項目に自動分解します</div>
        <textarea id="ai-paste-input" placeholder="修正内容をここにペースト…"></textarea>
        <div id="ai-loading" style="display:none;font-size:12px;color:var(--color-text2);padding:6px 0;text-align:center">⏳ AI分解中…</div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-primary" onclick="aiParseFixes()"><i class="ti ti-sparkles"></i> AIで分解</button>
          <button class="btn btn-sm" onclick="toggleManualFix()"><i class="ti ti-plus"></i> 手動追加</button>
        </div>
      </div>
      <div id="fix-manual-form" style="display:none;border:1px solid var(--color-primary-l);border-radius:var(--radius-sm);padding:12px;background:var(--color-primary-p);margin-bottom:10px">
        <input id="fix-title-m" placeholder="修正内容 *" style="width:100%;font-size:13px;padding:7px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);outline:none;margin-bottom:6px">
        <input id="fix-note-m" placeholder="補足（任意）" style="width:100%;font-size:13px;padding:7px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);outline:none;margin-bottom:6px">
        <div style="display:flex;gap:6px;justify-content:flex-end">
          <button class="btn btn-sm" onclick="toggleManualFix()">キャンセル</button>
          <button class="btn btn-sm btn-primary" onclick="addFixManual()">追加</button>
        </div>
      </div>
      <div id="fix-rows">${rows}</div>
    </div>`;
}

function renderTimeline(p){
  const events=[];
  if(p.revision)events.push({date:p.revision,label:"最終修正締切"});
  if(p.deadline)events.push({date:p.deadline,label:p.section==="completed"?"納品日":"最終期日"});
  if(p.nextSchedule)events.push({date:p.nextSchedule,label:"次回日程"});
  (p.mtg||[]).forEach(m=>events.push({date:m,label:"MTG"}));
  (p.fixes||[]).filter(f=>f.date).forEach(f=>events.push({date:f.date,label:`修正: ${f.title}`,done:f.done}));
  events.sort((a,b)=>a.date.localeCompare(b.date));
  const t=tod();
  function tlcls(d){const diff=(new Date(d)-t)/(864e5);return diff<0?"past":diff<=14?"soon":"";}
  const html=events.length?events.map(e=>`<div class="tl-item ${tlcls(e.date)}"><div class="tl-date">${fd(e.date)}</div><div class="tl-label">${e.label}</div></div>`).join(""):`<div style="font-size:13px;color:var(--color-text2)">日程未登録</div>`;
  document.getElementById("panel-body").innerHTML=`<div class="section"><div class="timeline">${html}</div></div>`;
}

function collectInfoFields(){
  const p=projects.find(x=>x.id===panelId);if(!p)return;
  const g=id=>{const el=document.getElementById(id);return el?el.value:null;};
  if(g("p-memo")===null)return;
  p.memo=g("p-memo");p.person=g("p-person")||p.person;p.type=g("p-type")||p.type;
  if(p.section==="active"){
    p.deadline=g("p-deadline");p.revision=g("p-revision");
    p.amount=Number(g("p-amount"))||0;p.status=g("p-status");
    p.progress=Number(g("p-progress"))||0;
  }else if(p.section==="completed"){
    p.deadline=g("p-deadline");p.amount=Number(g("p-amount"))||0;
    const mv=g("p-maintenance");p.maintenance=mv==="true"?true:mv==="false"?false:null;
    p.maintenancePeriod=g("p-maintenancePeriod")||"";p.maintenanceFee=Number(g("p-maintenanceFee"))||0;
  }else if(p.section==="prospect"){
    p.prospectAmount=Number(g("p-prospectAmount"))||0;
    p.demoReady=g("p-demoReady")==="true";
    p.nextSchedule=g("p-nextSchedule")||"";p.startEstimate=g("p-startEstimate")||"";
  }
}
function addMtg(){
  const v=document.getElementById("mtg-input").value;if(!v)return;
  const p=projects.find(x=>x.id===panelId);
  if(!p.mtg)p.mtg=[];
  if(!p.mtg.includes(v)){p.mtg.push(v);p.mtg.sort();}
  renderMtgList(p);document.getElementById("mtg-input").value="";
}
function removeMtg(idx){const p=projects.find(x=>x.id===panelId);p.mtg.splice(idx,1);renderMtgList(p);}
async function savePanel(){
  collectInfoFields();const p=projects.find(x=>x.id===panelId);
  render();await saveProjectToGAS(p);renderPTab(p);
}
function closePanel(){
  if(currentPTab==="info")collectInfoFields();
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("panel").classList.remove("open");
  panelId=null;render();
}

// AI分解
async function aiParseFixes(){
  const text=document.getElementById("ai-paste-input").value.trim();
  if(!text){alert("テキストをペーストしてください");return;}
  document.getElementById("ai-loading").style.display="block";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:`以下のテキストから修正・対応が必要な項目を抽出し、JSONのみ出力してください。マークダウン不要。\n形式: [{"title":"20字以内","note":"補足or空文字"},...]\n\n${text}`}]})});
    const data=await res.json();
    const items=JSON.parse((data.content?.[0]?.text||"[]").replace(/```json|```/g,"").trim());
    const p=projects.find(x=>x.id===panelId);
    if(!p.fixes)p.fixes=[];
    items.forEach(item=>p.fixes.push({id:nextFixId++,title:item.title,note:item.note||"",done:false}));
    buildPTabs(p);renderFixes(p);render();await saveProjectToGAS(p);
    showToast(`✓ ${items.length}件追加しました`);
  }catch(e){showToast("⚠ AI分解失敗。手動で追加してください");}
  finally{const el=document.getElementById("ai-loading");if(el)el.style.display="none";}
}
function toggleManualFix(){const f=document.getElementById("fix-manual-form");f.style.display=f.style.display==="none"?"block":"none";}
async function addFixManual(){
  const title=document.getElementById("fix-title-m").value.trim();if(!title){alert("修正内容を入力してください");return;}
  const p=projects.find(x=>x.id===panelId);if(!p.fixes)p.fixes=[];
  p.fixes.push({id:nextFixId++,title,note:document.getElementById("fix-note-m").value.trim(),done:false});
  buildPTabs(p);renderFixes(p);render();await saveProjectToGAS(p);
}
async function toggleFix(idx){
  const p=projects.find(x=>x.id===panelId);p.fixes[idx].done=!p.fixes[idx].done;
  buildPTabs(p);renderFixes(p);render();await saveProjectToGAS(p);
}
async function deleteFix(idx){
  const p=projects.find(x=>x.id===panelId);p.fixes.splice(idx,1);
  buildPTabs(p);renderFixes(p);render();await saveProjectToGAS(p);
}

  projects.push(newP);closeAdd();render();await saveProjectToGAS(newP);
}
async function confirmDelete(id){

  await deleteProjectFromGAS(id);projects=projects.filter(p=>p.id!==id);render();
